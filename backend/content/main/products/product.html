<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STADA - Product</title>
    <link rel="icon" type="image/png" href="../assets/logos/stada_logo.png" />
    <link rel="apple-touch-icon" href="../assets/logos/stada_logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css?v=dynamic-product-1" />
  </head>
  <body class="product-detail-page product-dynamic-page backend-content-pending" data-dynamic-product-page>
    <nav>
      <div class="nav-container">
        <a href="../index.html" class="logo" aria-label="STADA logo">
          <img src="../assets/logos/stada_logo.png" alt="STADA logo" />
        </a>
        <button class="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
        <ul class="menu">
          <li><a href="../index.html#about" data-i18n-key="nav_about"></a></li>
          <li><a href="../culture.html" data-i18n-key="nav_culture"></a></li>
          <li><a href="../history.html" data-i18n-key="nav_history"></a></li>
          <li><a href="../worldwide.html" data-i18n-key="nav_worldwide"></a></li>
          <li><a href="index.html" data-i18n-key="nav_products"></a></li>
        </ul>
        <div class="lang-toggle">
          <button class="lang-option" id="lang-ru" data-lang="ru" aria-label="Switch language to Russian">RU</button>
          <button class="lang-option" id="lang-kz" data-lang="kz" aria-label="Switch language to Kazakh">KZ</button>
        </div>
      </div>
    </nav>

    <main>
      <section class="product-hero" aria-labelledby="dynamic-product-heading">
        <div class="product-hero-content">
          <div class="product-hero-text vitrum-animate">
            <span class="product-kicker" data-product-kicker></span>
            <h1 id="dynamic-product-heading" data-product-title></h1>
            <p data-product-lead></p>
            <div class="product-hero-actions">
              <a href="#pharmacy-partners" class="product-button product-button--primary" data-i18n-key="where_to_buy_heading"></a>
              <a href="#benefits" class="product-button product-button--secondary" data-i18n-key="benefits_heading"></a>
            </div>
            <div class="product-badges" aria-label="Product highlights" data-product-badges></div>
          </div>

          <div class="product-hero-visual vitrum-animate">
            <div class="product-hero-image">
              <img class="product-hero-packshot" data-product-image src="../assets/products/catalog-thumbs/catalog-hero-podium.webp" alt="" />
            </div>
            <div class="product-hero-metrics" aria-label="Product facts" data-product-metrics></div>
          </div>
        </div>
      </section>

      <section class="product-detail-section product-overview" id="benefits" aria-labelledby="dynamic-product-overview-heading">
        <div class="product-section-inner">
          <div class="product-section-header vitrum-animate">
            <span class="product-kicker" data-product-overview-label></span>
            <h2 id="dynamic-product-overview-heading" data-product-overview-heading></h2>
            <p data-product-overview-intro></p>
          </div>

          <div class="product-facts-grid vitrum-stagger" data-product-facts></div>

          <div class="product-benefits-panel vitrum-animate">
            <h2 data-i18n-key="benefits_heading"></h2>
            <ul class="benefits-list" data-product-benefits></ul>
          </div>
        </div>
      </section>

      <section class="product-detail-section product-formula" aria-labelledby="dynamic-product-formula-heading">
        <div class="product-section-inner product-formula-layout snup-formula-layout">
          <div class="product-section-header vitrum-animate">
            <span class="product-kicker" data-product-formula-label></span>
            <h2 id="dynamic-product-formula-heading" data-product-formula-heading></h2>
            <p data-product-formula-intro></p>
          </div>

          <div class="snup-formula-system vitrum-animate" aria-label="Product details">
            <svg class="snup-formula-lines" viewBox="0 0 960 760" aria-hidden="true" focusable="false">
              <path class="snup-formula-line" d="M 430 330 C 382 316 382 242 330 210 C 304 194 282 184 260 178" />
              <path class="snup-formula-line" d="M 596 330 C 650 312 626 246 666 212 C 680 200 692 188 700 178" />
              <path class="snup-formula-line" d="M 590 454 C 650 492 642 548 596 566 C 574 578 558 580 548 580" />
              <circle class="snup-formula-dot" cx="260" cy="178" r="7" />
              <circle class="snup-formula-dot" cx="700" cy="178" r="7" />
              <circle class="snup-formula-dot" cx="548" cy="580" r="7" />
            </svg>
            <div class="snup-formula-core" aria-hidden="true">
              <div class="snup-formula-pack">
                <img class="snup-formula-product" data-product-formula-image src="../assets/products/catalog-thumbs/catalog-hero-podium.webp" alt="" />
              </div>
            </div>

            <div class="snup-formula-points" data-product-formula-points></div>
          </div>
        </div>
      </section>

      <section class="product-detail-section product-usage" aria-labelledby="dynamic-product-usage-heading">
        <div class="product-section-inner product-usage-layout">
          <div class="product-section-header vitrum-animate">
            <span class="product-kicker" data-product-usage-label></span>
            <h2 id="dynamic-product-usage-heading" data-product-usage-heading></h2>
          </div>
          <div class="usage-list vitrum-stagger" data-vitrum-usage data-product-usage-items></div>
          <aside class="product-note vitrum-animate">
            <h3 data-product-note-title></h3>
            <p data-product-note-text></p>
          </aside>
        </div>
      </section>

      <section class="product-where-to-buy" id="pharmacy-partners" aria-labelledby="dynamic-product-buy-heading">
        <div class="product-section-inner">
          <div class="product-section-header product-section-header--center vitrum-animate">
            <span class="product-kicker" data-i18n-key="where_to_buy_heading"></span>
            <h2 id="dynamic-product-buy-heading" data-i18n-key="products_partners_heading"></h2>
            <p data-product-buy-intro></p>
          </div>
          <div class="partners-grid vitrum-stagger" data-product-partners></div>
        </div>
      </section>

      <div class="product-back">
        <a href="index.html" class="back-link" data-i18n-key="product_back"></a>
      </div>
    </main>

    <footer class="site-footer" id="site-footer">
      <div class="footer-container footer-modern">
        <div class="footer-main">
          <div class="footer-brand">
            <a href="../index.html" class="footer-logo" aria-label="STADA logo">
              <img src="../assets/logos/stada_logo.png" alt="STADA logo" />
            </a>
            <p class="footer-eyebrow" data-i18n-key="site_name"></p>
            <p class="footer-text" data-i18n-key="footer_brand_text"></p>
            <div class="footer-trust" aria-label="STADA facts">
              <span data-i18n-key="footer_trust_years"></span>
              <span data-i18n-key="footer_trust_countries"></span>
            </div>
          </div>

          <nav class="footer-nav" aria-label="Footer navigation">
            <div class="footer-nav__group">
              <h3 data-i18n-key="footer_company_title"></h3>
              <a href="../index.html#about" data-i18n-key="nav_about"></a>
              <a href="../culture.html" data-i18n-key="nav_culture"></a>
              <a href="../history.html" data-i18n-key="nav_history"></a>
              <a href="../worldwide.html" data-i18n-key="nav_worldwide"></a>
              <a href="../index.html#news" data-i18n-key="nav_news"></a>
              <a href="../index.html#career" data-i18n-key="nav_career"></a>
              <a href="https://www.stada.com" target="_blank" rel="noopener" data-i18n-key="footer_global_link"></a>
            </div>
            <div class="footer-nav__group">
              <h3 data-i18n-key="footer_products_title"></h3>
              <a href="index.html" data-i18n-key="products_browse_catalog"></a>
            </div>
            <div class="footer-nav__group">
              <h3 data-i18n-key="footer_access_title"></h3>
              <a href="#pharmacy-partners" data-i18n-key="where_to_buy_heading"></a>
              <a href="index.html#products-catalog" data-i18n-key="products_filter_all"></a>
            </div>
          </nav>
        </div>

        <div class="footer-warning">
          <strong data-i18n-key="footer_warning_title"></strong>
          <p data-i18n-key="footer_warning_text"></p>
        </div>

        <div class="footer-bottom">
          <p>&copy; <span id="year"></span> STADA. <span data-i18n-key="footer_rights"></span></p>
          <div class="footer-bottom__links">
            <a href="https://www.stada.com" target="_blank" rel="noopener">stada.com</a>
            <a href="#" class="footer-top" data-i18n-key="footer_back_top" aria-label="Back to top"></a>
          </div>
        </div>
      </div>
    </footer>
    <script src="../js/script.js?v=dynamic-product-1"></script>
  </body>
</html>
